version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/db:/app/db
      - ./frontend:/frontend
    environment:
      - PORT=3001
      - DB_PATH=/app/db/airbnb.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - FRONTEND_DIR=/frontend
    restart: unless-stopped
