<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Airbnb Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --bg-input: #1a1a2e;
      --border: #2a2a3e;
      --text: #e8e8f0;
      --text-secondary: #8888a0;
      --accent: #ff385c;
      --accent-hover: #e0314f;
      --accent-glow: rgba(255, 56, 92, 0.15);
      --success: #00c48c;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: var(--accent-glow);
      border: 1px solid rgba(255, 56, 92, 0.3);
      border-radius: 16px;
      margin-bottom: 16px;
    }
    .logo-icon svg {
      width: 28px;
      height: 28px;
    }
    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .logo h1 span { color: var(--accent); }
    .logo p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      border-color: var(--accent);
    }
    .form-group input::placeholder {
      color: #555;
    }

    .error-msg {
      background: rgba(255, 56, 92, 0.1);
      color: var(--accent);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.visible { display: block; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      width: 100%;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .footer-text a:hover {
      text-decoration: underline;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--text-secondary);
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--text); }

    @media (max-width: 480px) {
      .login-container { padding: 16px; }
      .login-card { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M14 2L24 8V20L14 26L4 20V8L14 2Z" fill="white" opacity="0.9"/>
          <path d="M14 8L19 11V17L14 20L9 17V11L14 8Z" fill="#ff385c"/>
        </svg>
      </div>
      <h1>Airbnb <span>Manager</span></h1>
      <p>Sign in to your dashboard</p>
    </div>

    <div class="login-card">
      <div class="error-msg" id="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
      </form>

      <div class="divider">or</div>

      <div class="footer-text">
        Don't have an account? <a href="/onboarding">Get started free</a>
      </div>
    </div>

    <a href="/landing" class="back-link">← Back to homepage</a>
  </div>

  <script>
    const API = window.location.origin + '/api';

    // If already logged in, redirect to dashboard
    const existingToken = localStorage.getItem('airbnb_manager_token');
    if (existingToken) {
      // Verify the token is still valid
      fetch(`${API}/auth/me`, {
        headers: { 'Authorization': `Bearer ${existingToken}` }
      }).then(res => {
        if (res.ok) {
          window.location.href = '/';
        } else {
          // Token invalid, clear it
          localStorage.removeItem('airbnb_manager_token');
          localStorage.removeItem('airbnb_manager_user');
        }
      }).catch(() => {});
    }

    function showError(msg) {
      const el = document.getElementById('login-error');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function clearError() {
      const el = document.getElementById('login-error');
      el.textContent = '';
      el.classList.remove('visible');
    }

    async function handleLogin(e) {
      e.preventDefault();
      clearError();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');

      if (!email || !password) {
        return showError('Email and password are required');
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return showError(data.error || 'Login failed');
        }

        // Store auth data
        localStorage.setItem('airbnb_manager_token', data.token);
        localStorage.setItem('airbnb_manager_user', JSON.stringify(data.user));

        // Redirect to dashboard
        window.location.href = '/';
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Sign In';
        showError('Network error. Please try again.');
      }
    }

    document.getElementById('login-form').addEventListener('submit', handleLogin);
    // Focus email field on load
    document.getElementById('login-email').focus();
  </script>
</body>
</html>
